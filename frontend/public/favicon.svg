<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>

  <!-- Pull request icon: base commit node (bottom-left) -->
  <circle cx="16" cy="48" r="6" fill="#818cf8" stroke="#c7d2fe" stroke-width="1.5"/>

  <!-- Source branch node (top-left) -->
  <circle cx="16" cy="16" r="6" fill="#818cf8" stroke="#c7d2fe" stroke-width="1.5"/>

  <!-- Branch line -->
  <line x1="16" y1="22" x2="16" y2="42" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Merge target node (right) -->
  <circle cx="46" cy="32" r="6" fill="#34d399" stroke="#a7f3d0" stroke-width="1.5"/>

  <!-- Curved branch lines from top-left node to right node -->
  <path d="M 20 19 Q 46 19 46 26" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Arrow pointing into merge node -->
  <path d="M 40 29 L 46 26 L 44 32" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Checkmark inside merge node -->
  <path d="M 42 32 L 45 35 L 51 28" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
